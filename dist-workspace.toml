[workspace]
members = ["dist:."]


[package]
name = "linear"
description = "Git-first Linear CLI with workspace-aware auth, issue workflows, and automation-friendly JSON output"
version = "2.0.1"
license = "MIT"
repository = "https://github.com/kyaukyuai/linear-cli"
homepage = "https://github.com/kyaukyuai/linear-cli"
binaries = ["linear"]
build-command = [
    "sh",
    "-c",
    "deno compile --target=$CARGO_DIST_TARGET -o linear --allow-all --quiet src/main.ts",
]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "npm", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "kyaukyuai/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# A namespace to use when publishing this package to the npm registry
npm-scope = "@kyaukyuai"
# The npm package should have this name
npm-package = "linear-cli"
# Which actions to run on pull requests
# pr-run-mode = "upload"
# https://opensource.axo.dev/cargo-dist/book/ci/customizing.html#customizing-build-setup
github-build-setup = "../build-setup.yml"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
